# Tenant A — redact every PII column (strictest)
masking_enabled: true
protocol: postgres
rules:
  - table: customers
    column: email
    transformer: redact
    options: {}
  - table: customers
    column: phone_number
    transformer: redact
    options: {}
  - table: customers
    column: address
    transformer: redact
    options: {}
  - table: users
    column: email
    transformer: redact
    options: {}
  - table: users
    column: credit_card
    transformer: redact
    options: {}
  - table: users
    column: ssn
    transformer: redact
    options: {}
  - table: identities
    column: first_name
    transformer: redact
    options: {}
  - table: identities
    column: last_name
    transformer: redact
    options: {}
  - table: identities
    column: full_name
    transformer: redact
    options: {}
  - table: identities
    column: passport
    transformer: redact
    options: {}
  - table: network_logs
    column: ip_address
    transformer: redact
    options: {}
  - table: sensitive_misc
    column: secret_key
    transformer: redact
    options: {}
  - table: sensitive_misc
    column: token
    transformer: redact
    options: {}
