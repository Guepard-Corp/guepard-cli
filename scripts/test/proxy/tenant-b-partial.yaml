# Tenant B — partial masking: customers email + users credit_card only
masking_enabled: true
protocol: postgres
rules:
  - table: customers
    column: email
    transformer: redact
    options: {}
  - table: users
    column: credit_card
    transformer: redact
    options: {}
  - table: users
    column: ssn
    transformer: redact
    options: {}
